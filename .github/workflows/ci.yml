name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: rustfmt (check only)
        run: cargo fmt --all -- --check

      - name: clippy (deny warnings, all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test --all-targets

      - name: doc tests
        run: cargo test --doc

  # Later stages add: reduced-size crash sweep, fixed-seed proptest regressions,
  # a process-kill smoke run, and a criterion --test bench smoke (asserting
  # nothing about absolute numbers). They are omitted until the engine exists.
